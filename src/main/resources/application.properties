spring.application.name=FluxEngine
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/fluxengine;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false
management.endpoints.web.exposure.include=health,info

# FluxEngine login. Override on Render/VPS with env vars:
# FLUXENGINE_SECURITY_USERNAME=admin
# FLUXENGINE_SECURITY_PASSWORD=your-strong-password
fluxengine.security.username=${FLUXENGINE_SECURITY_USERNAME:admin}
fluxengine.security.password=${FLUXENGINE_SECURITY_PASSWORD:admin123}

# Public app URL for email verification links. On Render set to https://your-app.onrender.com
fluxengine.app.base-url=${FLUXENGINE_APP_BASE_URL:}
fluxengine.security.email=${FLUXENGINE_SECURITY_EMAIL:admin@local}

# Email verification. Keep disabled locally; enable on VPS/Render after SMTP configuration.
fluxengine.mail.enabled=${FLUXENGINE_MAIL_ENABLED:false}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

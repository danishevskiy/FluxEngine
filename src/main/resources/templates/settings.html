<form method="post" action="/admin/settings">
    <label>Material name</label>
    <input name="materialName" th:value="${settings.materialName}">

    <label>TEC coefficient, W/m² per mV</label>
    <input type="number" step="0.0001" name="kTec" th:value="${settings.kTec}">

    <label>Flux sensor coefficient, W/m² per mV</label>
    <input type="number" step="0.0001" name="kFlux" th:value="${settings.kFlux}">

    <label>Thickness, m</label>
    <input type="number" step="0.0001" name="thicknessM" th:value="${settings.thicknessM}">

    <label>Lambda source</label>
    <select name="lambdaSource" th:value="${settings.lambdaSource}">
        <option value="TEC">TEC</option>
        <option value="FLUX">Flux sensor</option>
    </select>

    <button type="submit">Save settings</button>
</form>

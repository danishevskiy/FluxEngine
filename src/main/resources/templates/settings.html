<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>FluxEngine Admin</title>

  <link rel="icon" href="/img/fluxengine-icon.png" type="image/png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/dashboard">
      <img src="/favicon.png" alt="FluxEngine" width="32" height="32">
      FluxEngine Admin
    </a>

    <div class="ms-auto">
      <a href="/dashboard" class="btn btn-outline-primary btn-sm">Dashboard</a>
    </div>
  </div>
</nav>

<main class="container py-4">

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">

      <h4 class="mb-2">Параметри експерименту</h4>
      <p class="text-muted mb-4">
        ESP32 передає сирі значення: <code>t1</code>, <code>t2</code>, <code>tec</code>, <code>flux</code>.
        Сервер розраховує q, ΔT та λ за заданими коефіцієнтами.
      </p>

      <form method="post" th:action="@{/admin/settings}" th:object="${settings}">

        <div class="row g-3">

          <div class="col-md-4">
            <label class="form-label">Назва матеріалу</label>
            <input type="text" class="form-control" th:field="*{materialName}">
          </div>

          <div class="col-md-2">
            <label class="form-label">Товщина δ, м</label>
            <input type="number" step="0.0001" class="form-control" th:field="*{thicknessM}">
          </div>

          <div class="col-md-3">
            <label class="form-label">kTEC, Вт/м² на мВ</label>
            <input type="number" step="0.0001" class="form-control" th:field="*{kTec}">
          </div>

          <div class="col-md-3">
            <label class="form-label">kFlux, Вт/м² на мВ</label>
            <input type="number" step="0.0001" class="form-control" th:field="*{kFlux}">
          </div>

          <div class="col-md-3">
            <label class="form-label">Джерело λ для основного аналізу</label>
            <select class="form-select" th:field="*{lambdaSource}">
              <option value="TEC">TEC sensor</option>
              <option value="FLUX">Flux sensor</option>
            </select>
          </div>

          <div class="col-md-3">
            <label class="form-label">Назва T1</label>
            <input type="text" class="form-control" th:field="*{t1Name}">
          </div>

          <div class="col-md-3">
            <label class="form-label">Назва T2</label>
            <input type="text" class="form-control" th:field="*{t2Name}">
          </div>

          <div class="col-md-3">
            <label class="form-label">Назва TEC</label>
            <input type="text" class="form-control" th:field="*{tecName}">
          </div>

          <div class="col-md-3">
            <label class="form-label">Назва Flux</label>
            <input type="text" class="form-control" th:field="*{fluxName}">
          </div>

        </div>

        <hr class="my-4">

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            Зберегти параметри
          </button>

          <a href="/dashboard" class="btn btn-outline-secondary">
            Повернутись до Dashboard
          </a>
        </div>

      </form>

    </div>
  </div>

</main>

</body>
</html>

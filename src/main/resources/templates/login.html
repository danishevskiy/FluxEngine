<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FluxEngine Login</title>
  <link rel="icon" href="/img/fluxengine-icon.png" type="image/png">
  <style>
    :root{font-family:Inter,system-ui,Arial,sans-serif;color:#172033;background:#f6f7fb}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#eef2ff,#f8fafc)}
    .login-card{width:100%;max-width:420px;background:#fff;border:1px solid #e8eaf0;border-radius:24px;box-shadow:0 18px 50px #0f172a20;padding:32px}
    .brand{display:flex;align-items:center;gap:14px;margin-bottom:24px}
    .brand img{width:52px;height:52px}.brand h1{font-size:26px;margin:0}.brand p{margin:4px 0 0;color:#64748b}
    label{display:block;font-weight:700;margin:16px 0 8px}
    input[type=text],input[type=password]{width:100%;box-sizing:border-box;border:1px solid #dbe2ea;border-radius:14px;padding:13px 14px;font-size:16px;outline:none}
    input:focus{border-color:#2563eb;box-shadow:0 0 0 4px #2563eb18}
    .remember{display:flex;gap:8px;align-items:center;margin:16px 0;color:#475569}
    button{width:100%;border:0;border-radius:14px;padding:13px 16px;background:#2563eb;color:white;font-weight:800;font-size:16px;cursor:pointer}
    button:hover{background:#1d4ed8}
    .alert{border-radius:14px;padding:12px 14px;margin:12px 0;font-weight:700}.bad{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}
    .hint{margin-top:18px;color:#64748b;font-size:13px;line-height:1.45}
  </style>
</head>
<body>
  <main class="login-card">
    <div class="brand">
      <img src="/img/fluxengine-icon.png" alt="FluxEngine">
      <div>
        <h1>FluxEngine</h1>
        <p>Захищений вхід</p>
      </div>
    </div>

    <div th:if="${param.error}" class="alert bad">Невірний логін або пароль.</div>
    <div th:if="${param.logout}" class="alert ok">Ви вийшли із системи.</div>
    <div th:if="${success}" class="alert ok" th:text="${success}"></div>
    <div th:if="${error}" class="alert bad" th:text="${error}"></div>

    <form th:action="@{/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <label for="username">Логін</label>
      <input id="username" name="username" type="text" autocomplete="username" required autofocus>

      <label for="password">Пароль</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>

      <label class="remember">
        <input type="checkbox" name="remember-me">
        Запамʼятати мене
      </label>

      <button type="submit">Увійти</button>
    </form>

    <p class="hint">Немає акаунта? <a href="/register">Зареєструватися</a>. </p>
  </main>
</body>
</html>

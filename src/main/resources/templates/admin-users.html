<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>FluxEngine Users</title>
  <link rel="icon" href="/img/fluxengine-icon.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/dashboard">
      <img src="/img/fluxengine-icon.png" alt="FluxEngine" width="32" height="32"> FluxEngine Admin
    </a>
    <div class="ms-auto d-flex gap-2">
      <a href="/dashboard" class="btn btn-outline-primary btn-sm">Dashboard</a>
      <a href="/admin/settings" class="btn btn-outline-secondary btn-sm">Settings</a>
      <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="btn btn-outline-danger btn-sm" type="submit">Вийти</button>
      </form>
    </div>
  </div>
</nav>

<main class="container py-4">
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <div class="card shadow-sm border-0 mb-4">
    <div class="card-body p-4">
      <h4 class="mb-3">Створення користувача адміністратором</h4>
      <form method="post" th:action="@{/admin/users}" class="row g-3">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="col-md-3"><label class="form-label">Логін</label><input name="username" class="form-control" required minlength="3"></div>
        <div class="col-md-3"><label class="form-label">Email</label><input name="email" type="email" class="form-control" required></div>
        <div class="col-md-3"><label class="form-label">Пароль</label><input name="password" type="password" class="form-control" required minlength="6"></div>
        <div class="col-md-3 d-flex flex-column justify-content-end gap-2">
          <label class="form-check"><input class="form-check-input" type="checkbox" name="adminRole"> Роль ADMIN</label>
          <label class="form-check"><input class="form-check-input" type="checkbox" name="enabled" checked> Активний</label>
          <label class="form-check"><input class="form-check-input" type="checkbox" name="emailVerified" checked> Email підтверджено</label>
        </div>
        <div class="col-12"><button class="btn btn-primary">Створити користувача</button></div>
      </form>
    </div>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <h4 class="mb-3">Користувачі</h4>
      <div class="table-responsive">
        <table class="table align-middle">
          <thead><tr><th>ID</th><th>Логін</th><th>Email</th><th>Ролі</th><th>Статус</th><th>Email</th><th>Створено</th><th></th></tr></thead>
          <tbody>
          <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td class="fw-semibold" th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td><span class="badge text-bg-secondary me-1" th:each="r : ${u.roles}" th:text="${r}"></span></td>
            <td><span class="badge" th:classappend="${u.enabled} ? ' text-bg-success' : ' text-bg-danger'" th:text="${u.enabled} ? 'Активний' : 'Заблокований'"></span></td>
            <td><span class="badge" th:classappend="${u.emailVerified} ? ' text-bg-success' : ' text-bg-warning'" th:text="${u.emailVerified} ? 'Підтверджено' : 'Очікує'"></span></td>
            <td th:text="${u.createdAt}"></td>
            <td class="text-end">
              <form th:if="${!u.enabled}" th:action="@{/admin/users/{id}/enable(id=${u.id})}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-sm btn-outline-success">Увімкнути</button>
              </form>
              <form th:if="${u.enabled}" th:action="@{/admin/users/{id}/disable(id=${u.id})}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-sm btn-outline-warning">Вимкнути</button>
              </form>
              <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post" class="d-inline" onsubmit="return confirm('Видалити користувача?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-sm btn-outline-danger">Видалити</button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>
</body>
</html>
